server:
  port: 8082

spring:
  application:
    name: order-service
  config:
    import: optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/orderdb}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:pedidos}
    password: ${SPRING_DATASOURCE_PASSWORD:pedidos123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

security:
  jwt:
    secret: ${JWT_SECRET:pedidos-ms-jwt-secret-key-2026-safe-token-01}

app:
  kafka:
    topic:
      order-events: ${APP_KAFKA_TOPIC_ORDER_EVENTS:order.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
